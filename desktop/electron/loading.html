<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>WebClaw Loading</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
html,body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  background: #020617;
  color: #e5e7eb;
  font-family: system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
}
html.theme-light, html.theme-light body {
  background: #f8fafc;
  color: #0f172a;
}
.root {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  width: 100%;
  gap: 16px;
}
.logo {
  font-size: 18px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #38bdf8;
}
html.theme-light .logo {
  color: #2563eb;
}
.spinner {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  border: 3px solid rgba(148,163,184,0.5);
  border-top-color: #38bdf8;
  animation: spin 0.9s linear infinite;
}
html.theme-light .spinner {
  border-color: rgba(100,116,139,0.28);
  border-top-color: #2563eb;
}
.text {
  font-size: 13px;
  color: #9ca3af;
  text-align: center;
  max-width: 420px;
}
html.theme-light .text {
  color: #64748b;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="root">
  <div class="logo">WebClaw</div>
  <div class="spinner"></div>
  <div class="text" id="message">请先启动 WebClawProxy 服务</div>
</div>
<script>
  try {
    var params = new URLSearchParams(window.location.search || "");
    var target = params.get("target");
    var theme = params.get("theme");
    var state = params.get("state");
    if (theme === "light") {
      document.documentElement.classList.add("theme-light");
    }
    var message = document.getElementById("message");
    if (state === "timeout") {
      if (message) {
        message.textContent = "网页加载超时，请检查网络连接/代理/VPN 是否正常";
      }
    } else if (target) {
      if (message) {
        message.textContent = "正在加载网页…";
      }
      var slowTimer = setTimeout(function () {
        if (!message) return;
        message.textContent = "网络请求较慢，请检查网络连接/代理/VPN 是否正常";
      }, 3000);
      setTimeout(function () {
        window.location.href = target;
      }, 300);
    }
  } catch (e) {
  }
</script>
</body>
</html>
