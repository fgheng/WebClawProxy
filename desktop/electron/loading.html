<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>WebClaw Loading</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
html,body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  background: #020617;
  color: #e5e7eb;
  font-family: system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
}
.root {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  width: 100%;
  gap: 16px;
}
.logo {
  font-size: 18px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #38bdf8;
}
.spinner {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  border: 3px solid rgba(148,163,184,0.5);
  border-top-color: #38bdf8;
  animation: spin 0.9s linear infinite;
}
.text {
  font-size: 13px;
  color: #9ca3af;
  text-align: center;
  max-width: 420px;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="root">
  <div class="logo">WebClaw</div>
  <div class="spinner"></div>
  <div class="text" id="message">请先启动 WebClaw 服务</div>
</div>
<script>
  try {
    var params = new URLSearchParams(window.location.search || "");
    var target = params.get("target");
    var message = document.getElementById("message");
    if (target) {
      if (message) {
        message.textContent = "正在启动浏览器会话…";
      }
      setTimeout(function () {
        window.location.href = target;
      }, 300);
    }
  } catch (e) {
  }
</script>
</body>
</html>
